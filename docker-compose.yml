services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dr_sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drebrahimimoghaddam
    depends_on:
      - sqlserver
    ports:
      - "8090:8090"
    environment:
      ASPNETCORE_URLS: "http://+:8090"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=DrEbrahimiDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True"

volumes:
  sqldata: